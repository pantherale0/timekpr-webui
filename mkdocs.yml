site_name: Guardian Documentation
site_description: Cross-platform parental controls — server, agents, and cloud console integration
site_url: https://pantherale0.github.io/timekpr-webui/
repo_url: https://github.com/pantherale0/timekpr-webui
repo_name: pantherale0/timekpr-webui
edit_uri: edit/master/docs/

remote_branch: gh-pages

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - redirects:
      redirect_maps:
        android-agent.md: platforms/android-agent.md
        linux-agent.md: platforms/linux-agent.md
        app-discovery.md: features/app-discovery.md
  - mike:
      alias_type: symlink

extra:
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/pantherale0/timekpr-webui

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting started:
      - Overview: getting-started/overview.md
      - vs commercial parental controls: getting-started/comparison.md
      - Server deployment: getting-started/server-deployment.md
      - Configuration: getting-started/configuration.md
      - Security: getting-started/security.md
  - Platforms:
      - Linux agent: platforms/linux-agent.md
      - Android agent: platforms/android-agent.md
      - Android bypass matrix: platforms/android-bypasses.md
      - Windows agent: platforms/windows-agent.md
      - Nintendo Switch: platforms/nintendo-switch.md
      - Xbox: platforms/xbox.md
      - Debug agent: platforms/debug-agent.md
  - Web UI:
      - Dashboard: web-ui/dashboard.md
      - Schedules & limits: web-ui/schedules-and-limits.md
      - Web filters: web-ui/web-filters.md
      - App policies: web-ui/app-policies.md
      - Access requests: web-ui/access-requests.md
      - Child accounts & mappings: web-ui/child-accounts-and-mappings.md
      - Device management: web-ui/device-management.md
      - Settings: web-ui/settings.md
      - Install PWA: web-ui/install-pwa.md
  - Workflows:
      - Pairing & approval: workflows/pairing-and-approval.md
      - Policy assignment: workflows/policy-assignment.md
      - Cloud console setup: workflows/cloud-console-setup.md
      - Unenroll & factory reset: workflows/unenroll-and-factory-reset.md
  - Features:
      - App discovery: features/app-discovery.md
      - Screenshots: features/screenshots.md
      - Device restrictions: features/device-restrictions.md
      - Browser restrictions: features/browser-restrictions.md
      - Web & video history: features/web-video-history.md
      - Alerts & webhooks: features/alerts-and-webhooks.md
      - Site registration approvals: features/registration-approvals.md
      - Policy presets: features/policy-presets.md
      - Guardian Space overlay: features/guardian-overlay.md
  - Reference:
      - Policy matrix: reference/policy-matrix.md
      - WebSocket protocol: reference/websocket-protocol.md
      - REST API: reference/rest-api.md
      - Background worker: reference/background-worker.md
      - Auth & OIDC: reference/auth-and-oidc.md
  - Troubleshooting: troubleshooting/index.md
  - Development:
      - Contributing: development/contributing.md
      - Local development: development/local-dev.md
      - CI & releases: development/ci-release.md
      - Screenshot assets: assets/images/README.md
