# Browser extension strings → Chrome _locales/<lang>/messages.json
meta:
  locale: en
  label: English

messages:
  extensionName:
    message: Guardian
    description: Extension name shown in the browser toolbar and store listing.

  extensionDescription:
    message: Guardian browser extension for parental controls and activity monitoring.
    description: Short description shown in the extension management page.

  signupBlockNote:
    message: Creating accounts online requires a parent check.
    description: Default parent note when redirecting to the signup block overlay.

  blockedPageTitle:
    message: Approval Required — Guardian
    description: Document title for the legacy registration block page.

  blockedHeaderTitle:
    message: Guardian Parental Controls
    description: Card header title on the registration block page.

  blockedHeaderSubtitle:
    message: Managed by your parent or guardian
    description: Card header subtitle on the registration block page.

  blockedHeading:
    message: Approval required to sign up
    description: Main heading on the registration block page.

  blockedSub:
    message: >-
      Creating an account on this website requires your parent or guardian's approval.
      Request approval below and wait for it to be granted before continuing.
    description: Explanatory copy on the registration block page.

  domainLoading:
    message: Loading…
    description: Placeholder while the blocked domain name is resolved.

  statusIdle:
    message: No approval request has been sent yet.
    description: Status banner when no signup approval request exists.

  btnRequestApproval:
    message: Request Approval
    description: Primary button to request signup approval from a parent.

  btnCheckStatus:
    message: Check Approval Status
    description: Secondary button to refresh signup approval status.

  footerAutoCheck:
    message: Status is automatically checked every 10 seconds. Page will redirect on approval.
    description: Footer note on the registration block page.

  unknownSite:
    message: Unknown site
    description: Fallback label when the blocked domain cannot be determined.

  sending:
    message: Sending…
    description: Button label while a signup approval request is being sent.

  statusPendingSent:
    message: Approval request sent. Waiting for your parent or guardian to respond…
    description: Status banner after a signup approval request is submitted.

  statusSendFailed:
    message: Could not send request. Please try again.
    description: Status banner when signup approval request fails.

  statusPendingWaiting:
    message: Approval request is pending. Your parent or guardian has not responded yet.
    description: Status banner when signup approval is still pending.

  statusApproved:
    message: Approved! Redirecting you back to the sign-up page…
    description: Status banner when signup approval is granted.
