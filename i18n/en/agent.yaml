overlay:
  under8:
    sleep:
      title: Time for cozy sleep
      desc: Your tablet is going to sleep so you can dream of stars and magic! Let's shut our eyes together.
      note: Hey little explorer! Let's rest our eyes now. Go cuddle up or draw a puppy below!
      target: Cozy Time
    filtered:
      title: Let's explore somewhere else
      desc: We paused this page to keep our digital backyard safe and fun. Want to try a new drawing?
      note: Your parents chose this to keep your playtime awesome. Draw your favorite animal below!
      target: Filtered Page
    locked:
      title: Tablet playtime pause
      desc: This game is taking a little nap. Let's play with our real toys or try some big breaths!
      note: Playtime is paused for now. Let's do some finger-painting on the screen instead!
      target: Game Paused
    signup:
      title: Let's ask your grown-up!
      desc: Signing up needs a quick approval from your parents or carers. Press the helper button!
      note: To sign up safely, click 'Request Sign-up' and let your guardians know.
      target: New Account
  eight12:
    sleep:
      title: Time to power down & recharge
      desc: Your device-free bedtime routine is active. Time to let your brain rest and recharge for tomorrow.
      note: Hey! Bedtime schedule is on. Sleep well, and your limits will refresh first thing in the morning!
      target: Sleep Routine Active
    filtered:
      title: This website is paused
      desc: Under your Guardian rules, access to this site is currently restricted. Let's find something else to explore.
      note: Hey! We agreed to skip this site to keep our studies and gaming balanced. Homework first!
      target: website-restricted
    locked:
      title: Application is taking a break
      desc: This game or application is currently locked to support real-life screen limits.
      note: Hey! Playtime is up for this game. Let's head downstairs, check in with the family, or try drawing!
      target: app-locked-profile
    signup:
      title: Account Sign-Up requires permission
      desc: Making new profiles on websites is audited to keep your personal data secure. Let's send a request.
      note: Creating accounts online requires an admin check. Send a request to get verified.
      target: auth-portal-block
  teen:
    sleep:
      title: Wind-down limits in effect
      desc: To protect sleep hygiene, this machine has entered offline Wind-Down mode.
      note: Bedtime rules are active. If you need a temporary extension for a project, submit a quick note.
      target: System Sleep (22:00 - 07:00)
    filtered:
      title: Filtered under active policy
      desc: This domain has been restricted under your Guardian Space safety guidelines.
      note: Site paused under study-time guidelines. If you believe this is classified incorrectly, let me know.
      target: URL Intercept Layer
    locked:
      title: Process terminated by scheduler
      desc: This application has been suspended in accordance with active session schedule limits.
      note: This application is restricted during study hours. Focus first, play later!
      target: Process Watchdog Engine
    signup:
      title: Registration Approval Mandatory
      desc: Guardian has intercepted a sign-up flow. Creation of external profiles requires active administrative approval.
      note: Signing up? No worries, just submit the approval ticket below so we can keep your details secure.
      target: Registration Audit Trigger

