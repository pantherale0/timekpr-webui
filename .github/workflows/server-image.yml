name: Server Image CI

on:
  pull_request:
    paths:
      - "server/**"
      - "i18n/**"
      - "extension/**"
      - "scripts/package-extension.py"
      - "scripts/i18n/**"
      - "docker-compose.yaml"
      - ".github/workflows/server-image.yml"
  push:
    branches:
      - "master"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  i18n:
    uses: ./.github/workflows/i18n-check.yml

  changes:
    runs-on: ubuntu-latest
    outputs:
      server_changed: ${{ steps.filter.outputs.server }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Detect server-related changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            server:
              - "server/**"
              - "i18n/**"
              - "extension/**"
              - "scripts/package-extension.py"
              - "scripts/i18n/**"
              - "docker-compose.yaml"
              - ".github/workflows/server-image.yml"

  build-and-publish:
    needs: [i18n, changes]
    if: startsWith(github.ref, 'refs/tags/v') || needs.changes.outputs.server_changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image name
        id: image
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          repo="$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${owner}/${repo}-server" >> "$GITHUB_OUTPUT"

      - name: Compute image tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version="${GITHUB_REF#refs/tags/}"
            echo "value=${version}" >> "$GITHUB_OUTPUT"
            echo "extension_version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == "refs/heads/master" ]]; then
            echo "value=nightly" >> "$GITHUB_OUTPUT"
            echo "extension_version=0.0.0" >> "$GITHUB_OUTPUT"
          else
            echo "value=nightly" >> "$GITHUB_OUTPUT"
            echo "extension_version=0.0.0" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Stage i18n catalogs
        run: |
          python -m pip install --disable-pip-version-check PyYAML
          python scripts/i18n/manage.py bundle --target server
          python scripts/i18n/manage.py bundle --target extension

      - name: Package Chrome extension
        env:
          EXTENSION_SIGNING_KEY_PEM: ${{ secrets.EXTENSION_SIGNING_KEY_PEM }}
        run: |
          set -euo pipefail

          if [[ -n "${EXTENSION_SIGNING_KEY_PEM}" ]]; then
            mkdir -p server/static/extensions
            printf '%s' "${EXTENSION_SIGNING_KEY_PEM}" > server/static/extensions/key.pem
            python -m pip install --disable-pip-version-check crx3 cryptography
            python3 scripts/package-extension.py \
              --version "${{ steps.tag.outputs.extension_version }}" \
              --require-existing-key
          elif [[ -f server/static/extensions/youtube_monitor.crx ]]; then
            echo "EXTENSION_SIGNING_KEY_PEM not configured; using committed CRX artifact."
          else
            echo "No extension signing key and no committed CRX artifact available." >&2
            exit 1
          fi

      - name: Log in to GHCR
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./server/Dockerfile
          push: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')) }}
          tags: ${{ steps.image.outputs.name }}:${{ steps.tag.outputs.value }}
          build-args: |
            SERVER_VERSION=${{ steps.tag.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
