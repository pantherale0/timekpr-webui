name: Server Image CI

on:
  pull_request:
    paths:
      - "server/**"
      - "docker-compose.yaml"
      - ".github/workflows/server-image.yml"
  push:
    branches:
      - "master"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      server_changed: ${{ steps.filter.outputs.server }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Detect server-related changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            server:
              - "server/**"
              - "docker-compose.yaml"
              - ".github/workflows/server-image.yml"

  build-and-publish:
    needs: changes
    if: startsWith(github.ref, 'refs/tags/v') || needs.changes.outputs.server_changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image name
        id: image
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          repo="$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${owner}/${repo}-server" >> "$GITHUB_OUTPUT"

      - name: Compute image tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version="${GITHUB_REF#refs/tags/}"
            echo "value=${version}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == "refs/heads/master" ]]; then
            echo "value=nightly" >> "$GITHUB_OUTPUT"
          else
            echo "value=nightly" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally push image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')) }}
          tags: ${{ steps.image.outputs.name }}:${{ steps.tag.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
