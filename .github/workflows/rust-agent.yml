name: Rust Agent CI

on:
  pull_request:
    paths:
      - "agent/**"
      - ".github/workflows/rust-agent.yml"
  push:
    branches:
      - "master"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      agent_changed: ${{ steps.filter.outputs.agent }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Detect agent-related changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            agent:
              - "agent/**"
              - ".github/workflows/rust-agent.yml"

  check:
    needs: changes
    if: startsWith(github.ref, 'refs/tags/v') || needs.changes.outputs.agent_changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "agent -> target"

      - name: Run cargo check
        run: cargo check --manifest-path agent/Cargo.toml

  release-build:
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain with target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install aarch64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "agent -> target"

      - name: Build release binary
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          cargo build --release --manifest-path agent/Cargo.toml --target "${{ matrix.target }}"

      - name: Package release asset
        run: |
          mkdir -p dist
          tar -czf "dist/timekpr-agent-${{ matrix.target }}.tar.gz" \
            -C "agent/target/${{ matrix.target }}/release" \
            timekpr-agent

      - name: Upload packaged asset
        uses: actions/upload-artifact@v4
        with:
          name: agent-${{ matrix.target }}
          path: dist/timekpr-agent-${{ matrix.target }}.tar.gz

  publish-release:
    needs: release-build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: agent-*
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
