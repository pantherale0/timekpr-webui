name: Agent CI

on:
  pull_request:
    paths:
      - "agent/**"
      - "android-agent/**"
      - ".github/workflows/rust-agent.yml"
  push:
    branches:
      - "master"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      linux_agent_changed: ${{ steps.filter.outputs.linux_agent }}
      android_agent_changed: ${{ steps.filter.outputs.android_agent }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Detect agent-related changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            linux_agent:
              - "agent/**"
              - ".github/workflows/rust-agent.yml"
            android_agent:
              - "android-agent/**"
              - ".github/workflows/rust-agent.yml"

  linux-check:
    needs: changes
    if: startsWith(github.ref, 'refs/tags/v') || needs.changes.outputs.linux_agent_changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "agent -> target"

      - name: Run cargo check
        run: cargo check --manifest-path agent/Cargo.toml

  android-check:
    needs: changes
    if: startsWith(github.ref, 'refs/tags/v') || needs.changes.outputs.android_agent_changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: tools platform-tools build-tools;35.0.0

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9

      - name: Build debug APK
        working-directory: android-agent
        run: ./gradlew assembleDebug --no-daemon

      - name: Verify APK signature checksum script
        run: |
          chmod +x scripts/android-signature-checksum.sh
          apk="$(find android-agent/app/build/outputs/apk/debug -maxdepth 1 -type f -name '*.apk' | head -n 1)"
          if [[ -z "$apk" ]]; then
            echo "Debug APK not found after assembleDebug." >&2
            exit 1
          fi
          checksum="$(./scripts/android-signature-checksum.sh "$apk")"
          if [[ "$checksum" == "47DEQpj8HBSa-_TImW-5JCeuQeRkm5NMpJWZG3hSuFU" ]]; then
            echo "Checksum script returned empty digest; apksigner/build-tools may be missing." >&2
            exit 1
          fi
          echo "APK signature checksum: $checksum"

  linux-release-build:
    needs: linux-check
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain with target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install aarch64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "agent -> target"

      - name: Build release binary
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          export TIMEKPR_AGENT_VERSION="${{ github.ref_name }}"
          cargo build --release --manifest-path agent/Cargo.toml --target "${{ matrix.target }}"

      - name: Package release asset
        run: |
          mkdir -p dist
          tar -czf "dist/timekpr-agent-${{ matrix.target }}.tar.gz" \
            -C "agent/target/${{ matrix.target }}/release" \
            timekpr-agent

      - name: Install rsign
        run: cargo install rsign2 --locked --quiet

      - name: Sign release asset
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.TIMEKPR_AGENT_UPDATE_SIGNING_KEY }}
        run: |
          if [ -z "$MINISIGN_SECRET_KEY" ]; then
            echo "TIMEKPR_AGENT_UPDATE_SIGNING_KEY secret is required to publish signed agent releases." >&2
            exit 1
          fi
          signing_key="$(mktemp)"
          chmod 600 "$signing_key"
          printf '%s\n' "$MINISIGN_SECRET_KEY" > "$signing_key"
          asset="dist/timekpr-agent-${{ matrix.target }}.tar.gz"
          rsign sign "$asset" -s "$signing_key" -x "${asset}.minisig" -c "timekpr-agent ${{ github.ref_name }}"
          rm -f "$signing_key"

      - name: Upload packaged asset
        uses: actions/upload-artifact@v4
        with:
          name: linux-agent-${{ matrix.target }}
          path: |
            dist/timekpr-agent-${{ matrix.target }}.tar.gz
            dist/timekpr-agent-${{ matrix.target }}.tar.gz.minisig

  android-release-build:
    needs: android-check
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: tools platform-tools build-tools;35.0.0

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 secret is required for signed release APKs." >&2
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android-agent/release.keystore
          if ! keytool -list -keystore android-agent/release.keystore -storepass "$ANDROID_KEYSTORE_PASSWORD" >/dev/null 2>&1; then
            echo "Failed to load release keystore; check ANDROID_KEYSTORE_* secrets." >&2
            exit 1
          fi

      - name: Build release APK
        working-directory: android-agent
        env:
          TIMEKPR_AGENT_VERSION: ${{ github.ref_name }}
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android-agent/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew clean assembleRelease --no-daemon

      - name: Package release asset
        run: |
          mkdir -p dist
          release_dir="android-agent/app/build/outputs/apk/release"
          metadata="${release_dir}/output-metadata.json"
          if [[ ! -f "$metadata" ]]; then
            echo "Missing ${metadata}" >&2
            find "$release_dir" -type f -name '*.apk' -ls >&2 || true
            exit 1
          fi
          output_file="$(python3 -c "import json, pathlib; print(json.loads(pathlib.Path('${metadata}').read_text())['elements'][0]['outputFile'])")"
          if [[ "$output_file" == *unsigned* ]]; then
            echo "Release build produced unsigned APK (${output_file}); check keystore secrets." >&2
            exit 1
          fi
          apk_path="${release_dir}/${output_file}"
          if [[ ! -f "$apk_path" ]]; then
            echo "Signed release APK not found at ${apk_path}" >&2
            find "$release_dir" -type f -name '*.apk' -ls >&2 || true
            exit 1
          fi
          cp "$apk_path" "dist/timekpr-android-agent-${{ github.ref_name }}.apk"

      - name: Compute APK signature checksum
        run: |
          chmod +x scripts/android-signature-checksum.sh
          apk="dist/timekpr-android-agent-${{ github.ref_name }}.apk"
          checksum_file="dist/timekpr-android-agent-${{ github.ref_name }}.signature-checksum"
          ./scripts/android-signature-checksum.sh "$apk" > "$checksum_file"
          if [[ "$(tr -d '[:space:]' < "$checksum_file")" == "47DEQpj8HBSa-_TImW-5JCeuQeRkm5NMpJWZG3hSuFU" ]]; then
            echo "Refusing to publish the empty SHA-256 checksum; apksigner is required for v2/v3-signed APKs." >&2
            exit 1
          fi

      - name: Upload packaged asset
        uses: actions/upload-artifact@v4
        with:
          name: android-agent-apk
          path: |
            dist/timekpr-android-agent-${{ github.ref_name }}.apk
            dist/timekpr-android-agent-${{ github.ref_name }}.signature-checksum

  publish-release:
    needs: [linux-release-build, android-release-build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: "*-agent-*"
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
