name: Agent CI

on:
  pull_request:
    paths:
      - "agent/**"
      - "android-agent/**"
      - ".github/workflows/rust-agent.yml"
  push:
    branches:
      - "master"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      linux_agent_changed: ${{ steps.filter.outputs.linux_agent }}
      android_agent_changed: ${{ steps.filter.outputs.android_agent }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Detect agent-related changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            linux_agent:
              - "agent/**"
              - ".github/workflows/rust-agent.yml"
            android_agent:
              - "android-agent/**"
              - ".github/workflows/rust-agent.yml"

  linux-check:
    needs: changes
    if: startsWith(github.ref, 'refs/tags/v') || needs.changes.outputs.linux_agent_changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "agent -> target"

      - name: Run cargo check
        run: cargo check --manifest-path agent/Cargo.toml

  android-check:
    needs: changes
    if: startsWith(github.ref, 'refs/tags/v') || needs.changes.outputs.android_agent_changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9

      - name: Build debug APK
        working-directory: android-agent
        run: ./gradlew assembleDebug --no-daemon

  linux-release-build:
    needs: linux-check
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain with target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install aarch64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "agent -> target"

      - name: Build release binary
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          export TIMEKPR_AGENT_VERSION="${{ github.ref_name }}"
          cargo build --release --manifest-path agent/Cargo.toml --target "${{ matrix.target }}"

      - name: Package release asset
        run: |
          mkdir -p dist
          tar -czf "dist/timekpr-agent-${{ matrix.target }}.tar.gz" \
            -C "agent/target/${{ matrix.target }}/release" \
            timekpr-agent

      - name: Upload packaged asset
        uses: actions/upload-artifact@v4
        with:
          name: linux-agent-${{ matrix.target }}
          path: dist/timekpr-agent-${{ matrix.target }}.tar.gz

  android-release-build:
    needs: android-check
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9

      - name: Build release APK
        working-directory: android-agent
        run: ./gradlew assembleRelease --no-daemon

      - name: Package release asset
        run: |
          mkdir -p dist
          apk_path=$(find android-agent/app/build/outputs/apk/release -name '*.apk' | head -n 1)
          cp "$apk_path" "dist/timekpr-android-agent-${{ github.ref_name }}.apk"

      - name: Upload packaged asset
        uses: actions/upload-artifact@v4
        with:
          name: android-agent-apk
          path: dist/timekpr-android-agent-${{ github.ref_name }}.apk

  publish-release:
    needs: [linux-release-build, android-release-build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: "*-agent-*"
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
