name: Agent CI

on:
  pull_request:
    paths:
      - "agent/**"
      - "android-agent/**"
      - "i18n/**"
      - "scripts/i18n/**"
      - ".github/workflows/rust-agent.yml"
  push:
    branches:
      - "master"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      linux_agent_changed: ${{ steps.filter.outputs.linux_agent }}
      android_agent_changed: ${{ steps.filter.outputs.android_agent }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Detect agent-related changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            linux_agent:
              - "agent/**"
              - ".github/workflows/rust-agent.yml"
            android_agent:
              - "android-agent/**"
              - "agent/**"
              - "i18n/**"
              - "scripts/i18n/**"
              - ".github/workflows/rust-agent.yml"

  linux-check:
    needs: changes
    if: (!startsWith(github.ref, 'refs/tags/v')) && (needs.changes.outputs.linux_agent_changed == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Bundle agent i18n artifacts
        run: |
          python -m pip install --disable-pip-version-check PyYAML
          python scripts/i18n/manage.py validate
          python scripts/i18n/manage.py bundle --target agent

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "agent -> target"

      - name: Run cargo check
        run: cargo check --manifest-path agent/Cargo.toml

  windows-check:
    needs: changes
    if: (!startsWith(github.ref, 'refs/tags/v')) && (needs.changes.outputs.linux_agent_changed == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "agent -> target"

      - name: Run cargo check
        run: cargo check --manifest-path agent/Cargo.toml --target x86_64-pc-windows-msvc

      - name: Run cargo test
        run: cargo test --manifest-path agent/Cargo.toml --target x86_64-pc-windows-msvc

  android-check:
    needs: changes
    if: (!startsWith(github.ref, 'refs/tags/v')) && (needs.changes.outputs.android_agent_changed == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Bundle Android strings from i18n
        run: |
          python -m pip install --disable-pip-version-check PyYAML
          python scripts/i18n/manage.py validate
          python scripts/i18n/manage.py bundle --target agent

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: tools platform-tools build-tools;35.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "agent -> target"

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-ndk
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: cargo binstall -y --force cargo-ndk

      - name: Build Android Rust targets
        run: |
          cargo ndk --target aarch64-linux-android build --lib
        working-directory: agent

      - name: Copy native libraries to Android project
        run: |
          mkdir -p android-agent/app/src/main/jniLibs/arm64-v8a
          cp agent/target/aarch64-linux-android/debug/libguardian_agent.so android-agent/app/src/main/jniLibs/arm64-v8a/

      - name: Generate UniFFI Kotlin bindings
        run: |
          cargo run --features=uniffi/cli --bin uniffi-bindgen generate --language kotlin --library --no-format --out-dir ../android-agent/app/src/main/java/ target/aarch64-linux-android/debug/libguardian_agent.so
        working-directory: agent

      - name: Build debug APK
        working-directory: android-agent
        run: ./gradlew assembleDebug --no-daemon

      - name: Verify APK signature checksum script
        run: |
          chmod +x scripts/android-signature-checksum.sh
          apk="$(find android-agent/app/build/outputs/apk/debug -maxdepth 1 -type f -name '*.apk' | head -n 1)"
          if [[ -z "$apk" ]]; then
            echo "Debug APK not found after assembleDebug." >&2
            exit 1
          fi
          checksum="$(./scripts/android-signature-checksum.sh "$apk")"
          if [[ "$checksum" == "47DEQpj8HBSa-_TImW-5JCeuQeRkm5NMpJWZG3hSuFU" ]]; then
            echo "Checksum script returned empty digest; apksigner/build-tools may be missing." >&2
            exit 1
          fi
          echo "APK signature checksum: $checksum"

  linux-release-build:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Bundle agent i18n artifacts
        run: |
          python -m pip install --disable-pip-version-check PyYAML
          python scripts/i18n/manage.py validate
          python scripts/i18n/manage.py bundle --target agent

      - name: Install Rust toolchain with target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo ./scripts/setup-cross-apt.py
            sudo apt-get update
            sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross libdbus-1-dev:arm64 pkg-config
          else
            sudo apt-get update
            sudo apt-get install -y libdbus-1-dev pkg-config
          fi

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "agent -> target"

      - name: Build release binary
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
            export PKG_CONFIG_ALLOW_CROSS=1
            export PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig
          fi
          export GUARDIAN_AGENT_VERSION="${{ github.ref_name }}"
          cargo build --release --manifest-path agent/Cargo.toml --target "${{ matrix.target }}"

      - name: Package release asset
        run: |
          mkdir -p dist
          tar -czf "dist/guardian-agent-${{ matrix.target }}.tar.gz" \
            -C "agent/target/${{ matrix.target }}/release" \
            guardian-agent

      - name: Generate SHA-256 checksum
        run: |
          sha256sum "dist/guardian-agent-${{ matrix.target }}.tar.gz" | awk '{print $1}' > "dist/guardian-agent-${{ matrix.target }}.tar.gz.sha256"

      - name: Upload packaged asset
        uses: actions/upload-artifact@v4
        with:
          name: guardian-linux-agent-${{ matrix.target }}
          path: |
            dist/guardian-agent-${{ matrix.target }}.tar.gz
            dist/guardian-agent-${{ matrix.target }}.tar.gz.sha256

  windows-release-build:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Bundle agent i18n artifacts
        shell: bash
        run: |
          python -m pip install --disable-pip-version-check PyYAML
          python scripts/i18n/manage.py validate
          python scripts/i18n/manage.py bundle --target agent

      - name: Install Rust toolchain with target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "agent -> target"

      - name: Build release binary
        shell: bash
        run: |
          export GUARDIAN_AGENT_VERSION="${{ github.ref_name }}"
          cargo build --release --manifest-path agent/Cargo.toml --target x86_64-pc-windows-msvc

      - name: Compile MSI installer
        shell: bash
        run: |
          mkdir -p dist
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            VERSION="0.0.0"
          fi
          echo "Building MSI with version $VERSION"
          
          WIX_BIN="${WIX}bin"
          WIX_BIN_UNIX="$(echo "$WIX_BIN" | tr '\\' '/')"
          
          "$WIX_BIN_UNIX/candle.exe" \
            -dVersion="$VERSION" \
            -dSourceDir="agent/target/x86_64-pc-windows-msvc/release" \
            -o "agent/guardian-agent.wixobj" \
            "agent/guardian-agent.wxs"
            
          "$WIX_BIN_UNIX/light.exe" \
            -ext WixUIExtension \
            -o "dist/guardian-agent-x86_64-pc-windows-msvc.msi" \
            "agent/guardian-agent.wixobj"

      - name: Generate SHA-256 checksum
        shell: bash
        run: |
          sha256sum "dist/guardian-agent-x86_64-pc-windows-msvc.msi" | awk '{print $1}' > "dist/guardian-agent-x86_64-pc-windows-msvc.msi.sha256"

      - name: Upload packaged asset
        uses: actions/upload-artifact@v4
        with:
          name: guardian-windows-agent-msi
          path: |
            dist/guardian-agent-x86_64-pc-windows-msvc.msi
            dist/guardian-agent-x86_64-pc-windows-msvc.msi.sha256

  android-rust-build:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_rust: aarch64-linux-android
            target_ndk: aarch64-linux-android
            jni_dir: arm64-v8a
          - target_rust: armv7-linux-androideabi
            target_ndk: armv7-linux-androideabi
            jni_dir: armeabi-v7a
          - target_rust: x86_64-linux-android
            target_ndk: x86_64
            jni_dir: x86_64
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install Rust toolchain with target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target_rust }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "agent -> target"

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-ndk
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: cargo binstall -y --force cargo-ndk

      - name: Build Android Rust target
        run: cargo ndk --target ${{ matrix.target_ndk }} build --lib --release
        working-directory: agent

      - name: Upload compiled library
        uses: actions/upload-artifact@v4
        with:
          name: android-lib-${{ matrix.jni_dir }}
          path: agent/target/${{ matrix.target_rust }}/release/libguardian_agent.so

  android-release-build:
    needs: android-rust-build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Bundle Android strings from i18n
        run: |
          python -m pip install --disable-pip-version-check PyYAML
          python scripts/i18n/manage.py validate
          python scripts/i18n/manage.py bundle --target agent

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: tools platform-tools build-tools;35.0.0

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9

      - name: Download arm64 library
        uses: actions/download-artifact@v4
        with:
          name: android-lib-arm64-v8a
          path: android-agent/app/src/main/jniLibs/arm64-v8a

      - name: Download armeabi-v7a library
        uses: actions/download-artifact@v4
        with:
          name: android-lib-armeabi-v7a
          path: android-agent/app/src/main/jniLibs/armeabi-v7a

      - name: Download x86_64 library
        uses: actions/download-artifact@v4
        with:
          name: android-lib-x86_64
          path: android-agent/app/src/main/jniLibs/x86_64

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "agent -> target"

      - name: Generate UniFFI Kotlin bindings
        run: |
          cargo run --features=uniffi/cli --bin uniffi-bindgen generate --language kotlin --library --no-format --out-dir ../android-agent/app/src/main/java/ ../android-agent/app/src/main/jniLibs/arm64-v8a/libguardian_agent.so
        working-directory: agent

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 secret is required for signed release APKs." >&2
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android-agent/release.keystore
          if ! keytool -list -keystore android-agent/release.keystore -storepass "$ANDROID_KEYSTORE_PASSWORD" >/dev/null 2>&1; then
            echo "Failed to load release keystore; check ANDROID_KEYSTORE_* secrets." >&2
            exit 1
          fi

      - name: Build release APK
        working-directory: android-agent
        env:
          GUARDIAN_AGENT_VERSION: ${{ github.ref_name }}
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android-agent/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew clean assembleRelease --no-daemon

      - name: Package release asset
        run: |
          mkdir -p dist
          release_dir="android-agent/app/build/outputs/apk/release"
          metadata="${release_dir}/output-metadata.json"
          if [[ ! -f "$metadata" ]]; then
            echo "Missing ${metadata}" >&2
            find "$release_dir" -type f -name '*.apk' -ls >&2 || true
            exit 1
          fi
          output_file="$(python3 -c "import json, pathlib; print(json.loads(pathlib.Path('${metadata}').read_text())['elements'][0]['outputFile'])")"
          if [[ "$output_file" == *unsigned* ]]; then
            echo "Release build produced unsigned APK (${output_file}); check keystore secrets." >&2
            exit 1
          fi
          apk_path="${release_dir}/${output_file}"
          if [[ ! -f "$apk_path" ]]; then
            echo "Signed release APK not found at ${apk_path}" >&2
            find "$release_dir" -type f -name '*.apk' -ls >&2 || true
            exit 1
          fi
          cp "$apk_path" "dist/guardian-android-agent-${{ github.ref_name }}.apk"

      - name: Compute APK signature checksum
        run: |
          chmod +x scripts/android-signature-checksum.sh
          apk="dist/guardian-android-agent-${{ github.ref_name }}.apk"
          checksum_file="dist/guardian-android-agent-${{ github.ref_name }}.signature-checksum"
          ./scripts/android-signature-checksum.sh "$apk" > "$checksum_file"
          if [[ "$(tr -d '[:space:]' < "$checksum_file")" == "47DEQpj8HBSa-_TImW-5JCeuQeRkm5NMpJWZG3hSuFU" ]]; then
            echo "Refusing to publish the empty SHA-256 checksum; apksigner is required for v2/v3-signed APKs." >&2
            exit 1
          fi

      - name: Upload packaged asset
        uses: actions/upload-artifact@v4
        with:
          name: guardian-android-agent-apk
          path: |
            dist/guardian-android-agent-${{ github.ref_name }}.apk
            dist/guardian-android-agent-${{ github.ref_name }}.signature-checksum

  publish-release:
    needs: [linux-release-build, android-release-build, windows-release-build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: "*-agent-*"
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
