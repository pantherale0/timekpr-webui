name: Extension CI

on:
  pull_request:
    paths:
      - "extension/**"
      - "scripts/test-*.js"
      - "scripts/package-extension.py"
      - "i18n/**"
      - "scripts/i18n/**"
      - ".github/workflows/extension.yml"
  push:
    branches:
      - "master"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      extension_changed: ${{ steps.filter.outputs.extension }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Detect extension-related changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            extension:
              - "extension/**"
              - "scripts/test-*.js"
              - "scripts/package-extension.py"
              - "i18n/**"
              - "scripts/i18n/**"
              - ".github/workflows/extension.yml"

  # ─────────────────────────────────────────────────────────────────────────
  # Job 1: Pure unit tests — no browser required
  # Tests the utility modules (youtube_utils.js, tiktok_utils.js) using Node
  # ─────────────────────────────────────────────────────────────────────────
  unit-tests:
    needs: changes
    if: needs.changes.outputs.extension_changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run YouTube utils unit tests
        run: node scripts/test-youtube-utils.js

      - name: Run TikTok utils unit tests
        run: node scripts/test-tiktok-utils.js

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2: Browser integration test
  # Verifies that the extension correctly hides Google AI Mode elements and
  # SGE containers while leaving regular search results visible.
  #
  # KEY: Chrome extensions cannot run in --headless mode (a hard Chrome
  # limitation). We install Google Chrome Stable (the Debian .deb package)
  # rather than chromium-browser which on Ubuntu 22.04+ is a Snap stub that
  # silently drops --load-extension and --remote-debugging-port.
  # Xvfb provides a virtual X11 display for the headed browser process.
  # ─────────────────────────────────────────────────────────────────────────
  browser-integration-test:
    needs: changes
    if: needs.changes.outputs.extension_changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Chrome and Xvfb
        # ubuntu-24.04 runners already ship Google Chrome Stable.
        # Only install from Google's apt repo when it is absent (e.g. self-hosted runners).
        # gpg requires --batch --yes in non-interactive (no-TTY) CI environments.
        run: |
          set -euo pipefail
          if ! command -v google-chrome-stable &>/dev/null && ! command -v google-chrome &>/dev/null; then
            echo "Chrome not found — installing from Google apt repository..."
            curl -fsSL https://dl.google.com/linux/linux_signing_key.pub \
              | sudo gpg --batch --yes --dearmor -o /usr/share/keyrings/google-chrome.gpg
            echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] https://dl.google.com/linux/chrome/deb/ stable main" \
              | sudo tee /etc/apt/sources.list.d/google-chrome.list
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends google-chrome-stable
          else
            echo "Google Chrome already installed — skipping apt install."
          fi
          sudo apt-get install -y --no-install-recommends xvfb x11-utils

      - name: Locate Chrome binary
        id: chrome
        run: |
          path="$(command -v google-chrome-stable 2>/dev/null \
            || command -v google-chrome 2>/dev/null \
            || echo '')"
          if [[ -z "$path" ]]; then
            echo "Could not find a Google Chrome binary" >&2
            exit 1
          fi
          echo "path=$path" >> "$GITHUB_OUTPUT"
          echo "Chrome found at: $path"
          "$path" --version

      - name: Start Xvfb virtual display
        run: |
          Xvfb :99 -screen 0 1920x1080x24 -ac +extension RANDR &
          echo "XVFB_PID=$!" >> "$GITHUB_ENV"
          sleep 1
          DISPLAY=:99 xdpyinfo >/dev/null 2>&1 \
            && echo "Xvfb is running on :99" \
            || { echo "Xvfb failed to start" >&2; exit 1; }

      - name: Run extension browser integration tests
        env:
          DISPLAY: ":99"
          CHROMIUM_PATH: ${{ steps.chrome.outputs.path }}
          DEBUG_PORT: "9223"
          HTTP_PORT: "8085"
          SCREENSHOTS_DIR: "/tmp/ext-test-screenshots"
        run: node scripts/test-sge-hiding.js

      - name: Upload screenshots
        # Always upload so we get visual evidence on both pass and fail
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extension-test-screenshots
          path: /tmp/ext-test-screenshots/
          if-no-files-found: warn
          retention-days: 14

      - name: Stop Xvfb
        if: always()
        run: |
          if [[ -n "${XVFB_PID:-}" ]]; then
            kill "$XVFB_PID" 2>/dev/null || true
          fi

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3: i18n validation — verify all translation files are valid before
  # the extension is bundled into a release image
  # ─────────────────────────────────────────────────────────────────────────
  i18n-validate:
    needs: changes
    if: needs.changes.outputs.extension_changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: python -m pip install --disable-pip-version-check PyYAML

      - name: Validate i18n catalog
        run: python scripts/i18n/manage.py validate

      - name: Bundle extension translations (dry-run check)
        run: python scripts/i18n/manage.py bundle --target extension
