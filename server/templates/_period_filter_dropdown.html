{# Period filter dropdown — set date_filter_i18n_prefix; optional period_filter_class #}
<div class="{{ period_filter_class | default('guardian-period-filter') }} dropdown">
    <button class="btn btn-sm btn-outline-secondary dropdown-toggle guardian-period-filter-btn fw-semibold"
        id="dateFilterDropdown" type="button" data-bs-toggle="dropdown" aria-expanded="false"
        data-bs-auto-close="outside" aria-label="{{ t(date_filter_i18n_prefix ~ '.select_date_range') }}">
        <i class="fas fa-calendar-alt text-primary" aria-hidden="true"></i>
        <span class="guardian-period-filter-label" id="current-date-range-label">{{ t(date_filter_i18n_prefix ~ '.last_7_days') }}</span>
    </button>
    <div class="dropdown-menu dropdown-menu-end p-3 shadow border guardian-period-filter-menu">
        <h6 class="dropdown-header px-0 mb-2 fw-bold text-secondary">{{ t(date_filter_i18n_prefix ~ '.select_period') }}</h6>
        <div class="d-flex flex-column gap-1 mb-2">
            <button class="btn btn-sm text-start py-1.5 px-2 fw-semibold date-preset-btn" data-preset="today" type="button">{{ t(date_filter_i18n_prefix ~ '.today') }}</button>
            <button class="btn btn-sm text-start py-1.5 px-2 fw-semibold date-preset-btn" data-preset="yesterday" type="button">{{ t(date_filter_i18n_prefix ~ '.yesterday') }}</button>
            <button class="btn btn-sm text-start py-1.5 px-2 fw-semibold date-preset-btn active" data-preset="7days" type="button">{{ t(date_filter_i18n_prefix ~ '.last_7_days') }}</button>
            <button class="btn btn-sm text-start py-1.5 px-2 fw-semibold date-preset-btn" data-preset="30days" type="button">{{ t(date_filter_i18n_prefix ~ '.last_30_days') }}</button>
            <button class="btn btn-sm text-start py-1.5 px-2 fw-semibold date-preset-btn" data-preset="thismonth" type="button">{{ t(date_filter_i18n_prefix ~ '.this_month') }}</button>
        </div>
        <div class="dropdown-divider"></div>
        <h6 class="dropdown-header px-0 my-2 fw-bold text-secondary">{{ t(date_filter_i18n_prefix ~ '.custom_range') }}</h6>
        <div class="mb-2">
            <label class="form-label small fw-semibold text-secondary mb-1" for="filter-start-date">{{ t(date_filter_i18n_prefix ~ '.start_date') }}</label>
            <input type="date" id="filter-start-date" class="form-control form-control-sm">
        </div>
        <div class="mb-3">
            <label class="form-label small fw-semibold text-secondary mb-1" for="filter-end-date">{{ t(date_filter_i18n_prefix ~ '.end_date') }}</label>
            <input type="date" id="filter-end-date" class="form-control form-control-sm">
        </div>
        <button id="apply-custom-date" class="btn btn-sm btn-primary w-100 py-1.5 fw-semibold" type="button">{{ t(date_filter_i18n_prefix ~ '.apply_custom') }}</button>
    </div>
</div>
