{% extends "_spa_fragment.html" %}

{% block title %}Welcome - Guardian{% endblock %}

{% block content %}
<div class="guardian-welcome-shell">
    <article class="card welcome-card guardian-welcome-card shadow-sm border" aria-label="Welcome">
        <header class="welcome-header mb-4">
            <div class="guardian-avatar rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 72px; height: 72px; font-size: 2rem;">
                <i class="fas fa-shield-alt"></i>
            </div>
            <h1 class="guardian-page-title mb-2" style="font-size: 2rem;">{{ t('tpl.welcome.welcome_back') }}</h1>
            <p class="guardian-page-lead mb-0">{{ t('tpl.welcome.youre_signed_in_to_your') }}</p>
        </header>
        
        <div class="welcome-content mb-4 guardian-page-lead" style="font-size: 0.95rem; line-height: 1.6;">
            <p class="mb-2">{{ t('tpl.welcome.from_here_you_can_review') }}</p>
        </div>
        
        <div class="welcome-footer">
            <a href="{{ url_for('dashboard') }}" class="btn btn-primary guardian-btn-sage px-4 py-2 fw-bold">{{ t('tpl.welcome.go_to_family_home') }}</a>
        </div>
    </article>
</div>
{% endblock %}
