<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitation Expired - Guardian</title>
    
    <!-- Bootstrap 5.3 & AdminLTE 4 & FontAwesome 6 via jsDelivr CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@4.0.0/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body {
            font-family: 'Atkinson Hyperlegible', sans-serif;
            background: linear-gradient(160deg, var(--guardian-ivory) 0%, var(--guardian-sage-subtle) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            width: 400px;
            margin: 1.5rem;
        }
        .brand-icon-shield {
            font-size: 2.5rem;
            color: #ef4444; /* red indicator */
            margin-bottom: 0.5rem;
        }
        .login-card-body {
            border-radius: 0.5rem;
        }
    </style>
</head>
<body class="bg-body-tertiary">
    <div class="login-box">
        <div class="text-center mb-4">
            <i class="fas fa-exclamation-circle brand-icon-shield"></i>
            <h3 class="fw-bold mb-1">Invitation Expired</h3>
            <span class="text-secondary small fw-bold text-uppercase tracking-wider" style="font-size: 0.75rem; letter-spacing: 0.05em;">Error 410 Gone</span>
        </div>

        <div class="card shadow-lg border-0">
            <div class="card-body login-card-body p-4 text-center">
                <p class="text-muted mb-4">This child profile invitation code is invalid, has expired, or has already been fully redeemed.</p>

                <div class="alert alert-danger border-0 small mb-4 py-2 text-start" role="alert">
                    <i class="fas fa-info-circle me-1"></i>
                    <strong>What should I do?</strong> Please ask the child's primary parent/guardian to generate a new invitation link for you.
                </div>

                <a href="/login" class="btn btn-outline-secondary btn-cta w-100 fw-bold py-2 shadow-sm">
                    <i class="fas fa-arrow-left me-1"></i> Return to Login
                </a>
            </div>
        </div>
    </div>
</body>
</html>
