<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t('tpl.expired_invite.invitation_expired_guardian') }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 bg-light">
    <div class="card shadow-sm" style="max-width: 420px; width: 100%;">
        <div class="card-body p-4 text-center">
            <h1 class="h4 mb-3">Accept profile share?</h1>
            <p class="text-secondary mb-4">Confirm to link this shared child profile to your parent account.</p>
            <form method="POST" action="{{ url_for('ui_auth.redeem_invite_link', token=token) }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <button type="submit" class="btn btn-primary w-100 mb-2">Accept invite</button>
            </form>
            <a href="{{ url_for('ui_dashboard.dashboard') }}" class="btn btn-outline-secondary w-100">Cancel</a>
        </div>
    </div>
</body>
</html>
